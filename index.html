<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Découvrez Nîmes - Événement Incontournable</title>
    <style>
        :root {
            --primary-color: #c0392b; /* Rouge Arènes */
            --secondary-color: #f39c12; /* Doré Soleil */
            --text-color: #2c3e50;
            --bg-color: #fdfbf7;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), #e74c3c);
            color: white;
            text-align: center;
            padding: 3rem 1rem;
            position: relative;
            overflow: hidden;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.2rem;
            margin-top: 10px;
            opacity: 0.9;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>
    <header>
        <h1>Découvrez Nîmes</h1>
        <p>Événement Incontournable</p>
    </header>
    
    <div class="container">
        <div class="card">
            <h2>Bienvenue à Nîmes</h2>
            <p>Explorez la richesse historique et culturelle de cette magnifique ville.</p>
        </div>
    </div>
</body>
</html>
